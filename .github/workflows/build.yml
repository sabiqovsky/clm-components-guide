name: Build & Deploy Guide

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'build.js'
      - 'template.html'

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build encrypted guide
        env:
          BUILD_ENCRYPTION_KEY: ${{ secrets.BUILD_ENCRYPTION_KEY }}
        run: node build.js

      - name: Verify no plaintext in output
        run: |
          if grep -q "session.submit()" docs/index.html; then
            echo "ERROR: Plaintext content found in output"
            exit 1
          fi
          echo "Verification passed — no plaintext in output"

      - name: Commit and push docs/index.html
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: rebuild guide [skip ci]"
          git push
